<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Komari Scheduler</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);color:#1f2937}
.app{padding:32px;max-width:1100px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
h1{font-size:24px;margin:0}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(18px) saturate(140%);border:1px solid rgba(255,255,255,.6);border-radius:18px;padding:18px;box-shadow:0 6px 22px rgba(0,0,0,.08)}
form{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
input,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e5e7eb;background:#fff}
button{padding:10px 14px;border:none;border-radius:12px;background:#2d6a4f;color:#fff;cursor:pointer}
button.secondary{background:#6b7280}
table{width:100%;border-collapse:collapse;margin-top:14px}
th,td{text-align:left;padding:10px;border-bottom:1px solid #eee}
.go{background:#d1fae5;color:#065f46;padding:4px 8px;border-radius:999px;font-size:12px}
.stop{background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:999px;font-size:12px}
.muted{color:#6b7280}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🗓️ 事件定时推送</h1>
    <button onclick="create()">+ 新建事件</button>
  </header>
  <section class="card">
    <form id="event-form" onsubmit="return submitForm(event)">
      <input id="name" required placeholder="事件名称" />
      <input id="cron_expr" required placeholder="cron 表达式，如 0 8,20 * * *" />
      <textarea id="message" required rows="3" placeholder="推送内容"></textarea>
      <input id="chat_id" required placeholder="TG chat_id，如 -1001234567890" />
      <input id="tg_token" required placeholder="TG BOT_TOKEN" />
      <button type="submit">保存</button>
      <button type="button" class="secondary" onclick="document.getElementById('event-form').reset()">重置</button>
    </form>
  </section>
  <section class="card" style="margin-top:16px">
    <h3>事件列表</h3>
    <table>
      <thead><tr><th>#</th><th>名称</th><th>Cron</th><th>消息</th><th>ChatID</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </section>
</div>
<script>
async function load(){
  const res = await fetch('/api/events'); const rows = await res.json();
  document.getElementById('list').innerHTML = rows.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td><code>${r.cron_expr}</code></td><td>${r.message.slice(0,24)}…</td><td>${r.chat_id}</td><td><span class="${r.enabled?'go':'stop'}">${r.enabled?'启用':'停用'}</span></td><td><button onclick="del(${r.id})">删除</button></td></tr>`).join('');
}
async function submitForm(e){e.preventDefault();const body=Object.fromEntries(new FormData(document.getElementById('event-form')).entries());const res=await fetch('/api/events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});if(res.ok){document.getElementById('event-form').reset();load();}else{alert('保存失败');}return false;}
async function del(id){if(!confirm('确定删除？'))return;await fetch('/api/events/'+id,{method:'DELETE'});load();}
load();
</script>
</body>
</html>
