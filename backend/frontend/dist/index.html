<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Komari Scheduler</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#f5f7fa,#c3cfe2);color:#1f2937;background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed}
.app{padding:32px;max-width:1100px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
h1{font-size:24px;margin:0}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(18px) saturate(140%);border:1px solid rgba(255,255,255,.6);border-radius:18px;padding:18px;box-shadow:0 6px 22px rgba(0,0,0,.08)}
form{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
input,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e5e7eb;background:#fff}
button{padding:10px 14px;border:none;border-radius:12px;background:#2d6a4f;color:#fff;cursor:pointer}
button.secondary{background:#6b7280}
button.danger{background:#dc2626}
table{width:100%;border-collapse:collapse;margin-top:14px}
th,td{text-align:left;padding:10px;border-bottom:1px solid #eee}
.go{background:#d1fae5;color:#065f46;padding:4px 8px;border-radius:999px;font-size:12px}
.stop{background:#fee2e2;color:#991b1b;padding:4px 8px;border-radius:999px;font-size:12px}
.muted{color:#6b7280}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🗓️ 事件定时推送</h1>
    <div>
      <button onclick="openSettings()">⚙️ 设置</button>
      <button onclick="create()">+ 新建事件</button>
    </div>
  </header>
  <section class="card">
    <form id="event-form" onsubmit="return submitForm(event)">
      <input id="id" type="hidden" />
      <input id="name" required placeholder="事件名称" />
      <input id="message" required rows="3" placeholder="推送内容" />
      <input id="chat_id" required placeholder="TG chat_id，如 -1001234567890" />
      <input id="tg_token" required placeholder="TG BOT_TOKEN" />
      <input id="trigger_days" type="number" min="0" placeholder="自定义天数" />
      <button type="submit">保存</button>
      <button type="button" class="secondary" onclick="document.getElementById('event-form').reset();document.getElementById('id').value='';document.querySelector('#event-form button[type=submit]').textContent='保存'">重置</button>
    </form>
  </section>
  <section class="card" style="margin-top:16px">
    <h3>事件列表</h3>
    <table>
      <thead><tr><th>#</th><th>名称</th><th>消息</th><th>ChatID</th><th>自定义天数</th><th>下次</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="list"></tbody>
    </table>
  </section>
</div>

<div id="settings-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);align-items:center;justify-content:center">
  <div class="card" style="max-width:520px;width:90%">
    <h3>⚙️ 自定义背景</h3>
    <input id="bg_url" placeholder="输入图片 URL，留空恢复默认" />
    <div style="display:flex;gap:10px;margin-top:10px">
      <button onclick="saveSettings()">保存</button>
      <button class="secondary" onclick="document.getElementById('settings-modal').style.display='none'">关闭</button>
    </div>
  </div>
</div>

<script>
async function load(){
  const res = await fetch('/api/events'); const rows = await res.json();
  document.getElementById('list').innerHTML = rows.map(r=>`<tr><td>${r.id}</td><td>${r.name}</td><td>${r.message.slice(0,24)}…</td><td>${r.chat_id}</td><td>${r.trigger_days}天</td><td>${r.next_run ? new Date(r.next_run).toLocaleString() : '-'}</td><td><span class="${r.enabled?'go':'stop'}">${r.enabled?'启用':'停用'}</span></td><td>
  <button onclick="edit(${r.id}, '${r.name.replace(/'/g,"\\'")}', '${r.message.replace(/'/g,"\\'")}', '${r.chat_id}', '${r.tg_token}', ${r.trigger_days})">编辑</button>
  <button onclick="toggle(${r.id})">${r.enabled?'停用':'启用'}</button>
  <button class="danger" onclick="del(${r.id})">删除</button>
  </td></tr>`).join('');
}
async function submitForm(e){
  e.preventDefault();
  const id=document.getElementById('id').value;
  const body={
    name:document.getElementById('name').value,
    message:document.getElementById('message').value,
    chat_id:document.getElementById('chat_id').value,
    tg_token:document.getElementById('tg_token').value,
    trigger_days:parseInt(document.getElementById('trigger_days').value||'0',10)||0,
    enabled:true
  };
  const method=id?('PUT /api/events/'+id):'POST /api/events';
  const res=await fetch(id?('/api/events/'+id):'/api/events',{method:id?'PUT':'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(res.ok||res.status===204){
    document.getElementById('event-form').reset();
    document.getElementById('id').value='';
    document.querySelector('#event-form button[type=submit]').textContent='保存';
    load();
  }else{alert('保存失败');}
  return false;
}
async function del(id){if(!confirm('确定删除？'))return;await fetch('/api/events/'+id,{method:'DELETE'});load();}
async function toggle(id){if(!confirm('确定切换启用/停用？'))return;await fetch('/api/events/'+id+'/toggle',{method:'POST'});load();}
function edit(id,name,message,chat_id,tg_token,trigger_days){
  document.getElementById('id').value=id;
  document.getElementById('name').value=name;
  document.getElementById('message').value=message;
  document.getElementById('chat_id').value=chat_id;
  document.getElementById('tg_token').value=tg_token;
  document.getElementById('trigger_days').value=trigger_days||0;
  document.querySelector('#event-form button[type=submit]').textContent='更新';
  window.scrollTo({top:0,behavior:'smooth'});
}
async function openSettings(){
  const res=await fetch('/api/settings/background');
  const data=await res.json();
  document.getElementById('bg_url').value=data.background_url||'';
  document.getElementById('settings-modal').style.display='flex';
}
async function saveSettings(){
  const url=document.getElementById('bg_url').value.trim();
  await fetch('/api/settings/background',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({background_url:url})});
  applyBackground(url);
  document.getElementById('settings-modal').style.display='none';
}
function applyBackground(url){
  if(url){document.body.style.backgroundImage=`url(${url})`;}else{document.body.style.backgroundImage='';}
}
load();
</script>
</body>
</html>
